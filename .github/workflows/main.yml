name: Weekly Screenshot of Terms Page

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Ensure screenshots folder exists
        run: mkdir -p screenshots

      - name: Capture screenshot
        run: |
          node << 'EOF'
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              headless: "new",
              args: ["--no-sandbox", "--disable-setuid-sandbox"]
            });

            const page = await browser.newPage();
            await page.goto("https://cv.hres.ca/en/terms/15", { waitUntil: "networkidle2" });

            const timestamp = new Date().toISOString().split("T")[0];
            const path = `screenshots/terms15_${timestamp}.png`;

            await page.screenshot({ path, fullPage: true });
            await browser.close();
          })();
          EOF

      - name: Commit screenshot
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add screenshots/*.png
          git commit -m "Weekly screenshot update" || echo "No changes to commit"
          git push
