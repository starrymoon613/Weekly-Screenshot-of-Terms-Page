name: Run Screenshot

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run CV Terms Screenshot Action
        uses: ./.github/actions/cv-terms-screenshot
        with:
          days: 4
          output: screenshot.png

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-terms-screenshot
          path: screenshot.png
