name: Screenshot CV Terms

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 5'

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps

      - name: Run script
        run: node .github/actions/cv-terms-screenshot/screenshot.js

      - name: Verify file exists
        run: ls -lah

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: screenshot.png
          if-no-files-found: error
