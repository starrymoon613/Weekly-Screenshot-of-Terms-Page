name: Screenshot CV Terms

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm init -y
      - run: npm install playwright
      - run: npx playwright install --with-deps

      # ✅ Write JS file safely (NO YAML BREAKING)
      - run: |
          echo "const { chromium } = require('playwright');" > script.js
          echo "(async () => {" >> script.js
          echo "const browser = await chromium.launch();" >> script.js
          echo "const page = await browser.newPage();" >> script.js
          echo "await page.goto('https://cv.hres.ca/en/terms/15', { waitUntil: 'domcontentloaded', timeout: 0 });" >> script.js
          echo "await page.waitForSelector('table');" >> script.js
          echo "await page.click('th:has-text(\"Last updated\")');" >> script.js
          echo "await page.waitForTimeout(1000);" >> script.js
          echo "await page.click('th:has-text(\"Last updated\")');" >> script.js
          echo "await page.waitForTimeout(3000);" >> script.js
          echo "await page.locator('table').screenshot({ path: 'terms_latest.png' });" >> script.js
          echo "await browser.close();" >> script.js
          echo "})();" >> script.js

      # ✅ Run it
      - run: node script.js

      # ✅ Confirm file exists
      - run: ls -l

      # ✅ Upload artifact (THIS is what you want)
      - uses: actions/upload-artifact@v4
        with:
          name: terms-screenshot
          path: terms_latest.png
