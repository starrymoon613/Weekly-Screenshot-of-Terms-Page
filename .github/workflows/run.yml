name: Screenshot CV Terms

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      - name: Create screenshot script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();

            await page.goto('https://cv.hres.ca/en/terms/15', {
              waitUntil: 'domcontentloaded',
              timeout: 0
            });

            await page.waitForSelector('table');

            await page.click('th:has-text("Last updated")');
            await page.waitForTimeout(1000);
            await page.click('th:has-text("Last updated")');

            await page.waitForTimeout(3000);

            const table = page.locator('table');
            await table.screenshot({ path: 'terms_latest.png' });

            await browser.close();
          })();
          EOF

      - name: Run screenshot script
        run: node screenshot.js

      - name: Check file exists
        run: ls -l

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terms-screenshot
          path: terms_latest.png
``
