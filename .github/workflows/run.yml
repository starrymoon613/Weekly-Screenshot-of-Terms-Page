name: Weekly CV Terms Screenshot

on:
  workflow_dispatch:

  schedule:
    # Friday 09:00 AM Ottawa (EDT = UTC-4)
    - cron: '0 13 * * 5'

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Generate screenshot
        env:
          URL: https://cv.hres.ca/en/terms/15
          DAYS: 5
          OUTPUT: screenshot.png
        run: |
          node .github/actions/cv-terms-screenshot/screenshot.js

      - name: Verify screenshot created
        run: |
          ls -lah
          test -f screenshot.png

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-terms-screenshot
          path: screenshot.png
          if-no-files-found: error
