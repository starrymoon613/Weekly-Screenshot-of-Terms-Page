name: Screenshot CV Terms (Latest Updated)

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      - name: Capture screenshot (robust)
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            // ✅ retry logic
            for (let i = 0; i < 3; i++) {
              try {
                await page.goto('https://cv.hres.ca/en/terms/15', {
                  waitUntil: 'domcontentloaded', // faster, avoids full load
                  timeout: 120000
                });
                break;
              } catch (e) {
                console.log(`Retry ${i + 1}...`);
                if (i === 2) throw e;
              }
            }

            // ✅ wait for table to appear
            await page.waitForSelector('table', { timeout: 60000 });

            // ✅ click sort twice to force descending
            await page.click('th:has-text("Last updated")');
            await page.waitForTimeout(1000);
            await page.click('th:has-text("Last updated")');

            // ✅ wait for update
            await page.waitForTimeout(3000);

            // ✅ screenshot only table
            const table = await page.locator('table');
            await table.screenshot({ path: 'terms_latest.png' });

            await browser.close();
          })();
          EOF

      - name: Commit screenshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add terms_latest.png
          git commit -m "Update screenshot" || echo "No changes"
          git push
