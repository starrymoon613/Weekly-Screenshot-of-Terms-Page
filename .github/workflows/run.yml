name: Screenshot CV Terms

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      # ✅ Create script safely (no YAML errors)
      - name: Create script
        run: |
          cat << 'EOF' > script.js
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();

            await page.goto('https://cv.hres.ca/en/terms/15', {
              waitUntil: 'networkidle',
              timeout: 0
            });

            await page.waitForSelector('table');

            // ✅ toggle "Last updated" to newest first
            const header = page.locator('th:has-text("Last updated")');
            await header.click();
            await page.waitForTimeout(1500);
            await header.click();

            // ✅ wait for sort to apply
            await page.waitForTimeout(4000);

            // ✅ screenshot ONLY table
            await page.locator('table').screenshot({
              path: 'terms_latest.png'
            });

            await browser.close();
          })();
          EOF

      - name: Run script
        run: node script.js

      - name: Verify file
        run: ls -l

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terms-screenshot
          path: terms_latest.png
