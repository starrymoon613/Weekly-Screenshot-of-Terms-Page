name: Screenshot CV Terms

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      - name: Create script
        run: |
          cat << 'EOF' > script.js
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const page = await browser.newPage();

            // Retry loading page (avoid timeout)
            for (let i = 0; i < 3; i++) {
              try {
                await page.goto('https://cv.hres.ca/en/terms/15', {
                  waitUntil: 'domcontentloaded',
                  timeout: 60000
                });
                break;
              } catch (e) {
                console.log('Retrying...');
              }
            }

            await page.waitForSelector('table', { timeout: 60000 });

            // ✅ Toggle "Last updated" to newest
            const header = page.locator('th:has-text("Last updated")');
            await header.click();
            await page.waitForTimeout(1500);
            await header.click();

            await page.waitForTimeout(3000);

            // ✅ Screenshot ONLY table
            await page.locator('table').screenshot({
