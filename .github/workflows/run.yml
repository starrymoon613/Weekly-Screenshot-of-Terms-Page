name: Screenshot CV Terms (Latest Updated)

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      - name: Capture screenshot
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            await page.goto('https://cv.hres.ca/en/terms/15', {
              waitUntil: 'domcontentloaded',
              timeout: 60000
            });

            // ✅ Click "Last updated" column to sort descending
            await page.click('th:has-text("Last updated")');

            // wait for table refresh
            await page.waitForTimeout(3000);

            // Take screenshot of the table area
            const table = await page.locator('table');
            await table.screenshot({ path: 'terms_latest.png' });

            await browser.close();
          })();
          EOF

      - name: Commit screenshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add terms_latest.png
          git commit -m "Update latest CV terms screenshot" || echo "No changes"
          git push
