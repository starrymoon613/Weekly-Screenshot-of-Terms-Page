name: Screenshot CV Terms

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      # ✅ Create script safely (no YAML errors)
      - name: Create script
        run: |
          cat << 'EOF' > script.js
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const page = await browser.newPage();

            // ✅ Retry loading (fix timeout)
            let loaded = false;
            for (let i = 0; i < 3; i++) {
              try {
                await page.goto('https://cv.hres.ca/en/terms/15', {
                  waitUntil: 'domcontentloaded',
                  timeout: 60000
                });
                loaded = true;
                break;
              } catch (e) {
                console.log('Retry loading page...');
              }
            }

            if (!loaded) throw new Error('Page failed to load');

            // ✅ Wait only for table
            await page.waitForSelector('table', { timeout: 60000 });

            // ✅ Click toggle to get newest first
            const header = page.locator('th:has-text("Last updated")');
            await header.click();
            await page.waitForTimeout(1500);
            await header.click();

            // ✅ Let sorting finish
            await page.waitForTimeout(3000);

            // ✅ Screenshot TABLE ONLY (no header/footer)
