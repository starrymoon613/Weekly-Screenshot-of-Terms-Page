name: Screenshot CV Terms (Last 5 Days)

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      - name: Capture screenshot (last 5 days only)
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            // ✅ retry loading the page
            for (let i = 0; i < 3; i++) {
              try {
                await page.goto('https://cv.hres.ca/en/terms/15', {
                  waitUntil: 'domcontentloaded',
                  timeout: 120000
                });
                break;
              } catch (e) {
                console.log(`Retry ${i + 1}`);
                if (i === 2) throw e;
              }
            }

            // ✅ wait for table
            await page.waitForSelector('table', { timeout: 60000 });

            // ✅ sort by "Last updated" (newest first)
            await page.click('th:has-text("Last updated")');
            await page.waitForTimeout(1000);
            await page.click('th:has-text("Last updated")');
            await page.waitForTimeout(3000);

            // ✅ filter to last 5 days ONLY
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 5);

            await page.evaluate((cutoffDate) => {
              const rows = document.querySelectorAll('tbody tr');

              rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length < 6) return;

                const text = cells[5].innerText.trim();
                const date = new Date(text);

                if (date < new Date(cutoffDate)) {
                  row.style.display = 'none';
                }
              });
            }, cutoff.toISOString());

            // ✅ screenshot only table
            const table = await page.locator('table');
            await table.screenshot({ path: 'terms_latest.png' });

            await browser.close();
          })();
          EOF

      - name: Commit screenshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add terms_latest.png
          git commit -m "Update last 5 days screenshot" || echo "No changes"

          git pull --rebase || echo "Nothing to pull"
          git push || echo "Nothing to push"
