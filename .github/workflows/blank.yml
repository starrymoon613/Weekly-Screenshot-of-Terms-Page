
name: Filtered CV Screenshot

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      - name: Create script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require("playwright");
          const fs = require("fs");

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            await page.goto("https://cv.hres.ca/en/terms/15", {
              waitUntil: "domcontentloaded",
              timeout: 60000
            });

            // wait for table to fully render
            await page.waitForTimeout(8000);

            const tableExists = await page.locator("table").count();
            if (!tableExists) {
              await page.screenshot({ path: "debug.png", fullPage: true });
              throw new Error("Table not found");
            }

            // filter logic
            const threshold = new Date();
            threshold.setDate(threshold.getDate() - 4);

            await page.evaluate((thresholdStr) => {
              const threshold = new Date(thresholdStr);
              const table = document.querySelector("table");
              if (!table) return;

              const allowed = [
                "Code",
                "English display name",
                "French display name",
                "Source Status",
                "Last updated"
              ];

              const headers = Array.from(table.querySelectorAll("thead th"));

              // Find columns to keep
              const keepIndexes = [];
              headers.forEach((th, i) => {
                if (allowed.some(a => th.innerText.includes(a))) {
                  keepIndexes.push(i);
                }
              });

              // Remove unwanted header columns
              headers.forEach((th, i) => {
                if (!keepIndexes.includes(i)) th.remove();
              });

              // Process rows
              const rows = table.querySelectorAll("tbody tr");

              rows.forEach(row => {
                const cells = Array.from(row.querySelectorAll("td"));

                // Remove unwanted columns
                cells.forEach((td, i) => {
                  if (!keepIndexes.includes(i)) td.remove();
                });

                const updatedCell = row.querySelector("td:last-child");
                if (!updatedCell) {
                  row.remove();
                  return;
                }

                const date = new Date(updatedCell.innerText.trim());

                if (isNaN(date.getTime()) || date < threshold) {
                  row.remove();
                }
              });
            }, threshold.toISOString());

            await page.waitForTimeout(2000);

            await page.locator("table").screenshot({
              path: "screenshot.png"
            });

            if (!fs.existsSync("screenshot.png")) {
              throw new Error("Screenshot not created");
            }

            await browser.close();
          })();
          EOF

      - name: Run script
        run: node screenshot.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filtered-screenshot
          path: |
            screenshot.png
            debug.png
