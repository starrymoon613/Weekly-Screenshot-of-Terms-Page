
name: CV Screenshot (Filtered)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      - name: Run script
        run: |
          cat << 'EOF' > script.js
          const { chromium } = require("playwright");
          const fs = require("fs");

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();

            await page.goto("https://cv.hres.ca/en/terms/15");
            await page.waitForTimeout(8000);

            try {
              await page.evaluate(() => {
                const table = document.querySelector("table");
                if (!table) return;

                const allowed = [
                  "Code",
                  "English display name",
                  "French display name",
                  "Source Status",
                  "Last updated"
                ];

                const headers = Array.from(table.querySelectorAll("thead th"));

                // find columns to keep
                const keepIndexes = [];
                headers.forEach((th, i) => {
                  if (allowed.some(a => th.innerText.includes(a))) {
                    keepIndexes.push(i);
                  }
                });

                // remove extra columns
                headers.forEach((th, i) => {
                  if (!keepIndexes.includes(i)) th.remove();
                });

                const rows = table.querySelectorAll("tbody tr");

                const threshold = new Date();
                threshold.setDate(threshold.getDate() - 4);

                rows.forEach(row => {
                  const cells = Array.from(row.querySelectorAll("td"));

                  cells.forEach((td, i) => {
                    if (!keepIndexes.includes(i)) td.remove();
                  });

                  const last = row.querySelector("td:last-child");
                  if (!last) return row.remove();

                  const d = new Date(last.innerText.trim());

                  if (isNaN(d) || d < threshold) {
                    row.remove();
                  }
                });
              });
            } catch (e) {
              console.log("Filtering failed, continuing...");
            }

            await page.waitForTimeout(2000);

            await page.screenshot({ path: "screenshot.png", fullPage: false });

            if (!fs.existsSync("screenshot.png")) {
              await page.screenshot({ path: "screenshot.png", fullPage: true });
            }

            await browser.close();
          })();
          EOF

          node script.js

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: screenshot.png
