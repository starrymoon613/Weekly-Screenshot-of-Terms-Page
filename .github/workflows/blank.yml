
const { chromium } = require("playwright");

(async () => {
  const browser = await chromium.launch();
  const page = await browser.newPage();

  try {
    await page.goto("https://cv.hres.ca/en/terms/15", {
      timeout: 60000
    });

    await page.waitForTimeout(8000);

    // ✅ FILTERING (SAFE + WORKING)
    try {
      await page.evaluate(() => {
        const table = document.querySelector("table");
        if (!table) return;

        const allowed = [
          "Code",
          "English display name",
          "French display name",
          "Source Status",
          "Last updated"
        ];

        const headers = Array.from(table.querySelectorAll("thead th"));

        // ✅ find columns to keep
        const keep = [];
        headers.forEach((h, i) => {
          if (allowed.some(a => h.innerText.includes(a))) {
            keep.push(i);
          }
        });

        // ✅ remove unwanted header columns
        headers.forEach((h, i) => {
          if (!keep.includes(i)) h.remove();
        });

        const rows = table.querySelectorAll("tbody tr");

        // ✅ last 4 days threshold
        const threshold = new Date();
        threshold.setHours(0, 0, 0, 0);
        threshold.setDate(threshold.getDate() - 4);

        rows.forEach(row => {
          const cells = Array.from(row.querySelectorAll("td"));

          // ✅ remove unwanted columns
          cells.forEach((td, i) => {
            if (!keep.includes(i)) td.remove();
          });

          const last = row.querySelector("td:last-child");
          if (!last) {
            row.remove();
            return;
          }

          const text = last.innerText.trim();

          // ✅ extract YYYY-MM-DD safely
          const match = text.match(/\d{4}-\d{2}-\d{2}/);

          if (!match) {
            row.remove();
            return;
          }

          const rowDate = new Date(match[0]);
          rowDate.setHours(0, 0, 0, 0);

          // ✅ filter out old rows
          if (rowDate < threshold) {
            row.remove();
          }
        });

      });
    } catch (e) {
      console.log("Filtering skipped:", e);
    }

    await page.waitForTimeout(2000);

    // ✅ TAKE SCREENSHOT (always works)
    await page.screenshot({
      path: "screenshot.png",
      fullPage: true
    });

  } catch (err) {
    console.log("Main error:", err);

    // ✅ fallback screenshot if something fails
    await page.screenshot({
      path: "screenshot.png",
      fullPage: true
    });
  }

  await browser.close();
})();
