const { chromium } = require("playwright");

(async () => {
  const browser = await chromium.launch();
  const page = await browser.newPage();

  try {
    await page.goto("https://cv.hres.ca/en/terms/15", {
      timeout: 60000
    });

    await page.waitForSelector("table");

    // ✅ FILTER + CLEAN TABLE
    await page.evaluate(() => {
      const table = document.querySelector("table");
      if (!table) return;

      // ✅ CORRECT column names
      const allowed = [
        "Code",
        "English Display Name",
        "French Display Name",
        "Source",
        "Status",
        "Last updated"
      ];

      const headers = Array.from(table.querySelectorAll("thead th"));

      // map indexes to keep
      const keepIndexes = [];

      headers.forEach((th, i) => {
        const text = th.innerText.trim();

        if (allowed.some(a => text.includes(a))) {
          keepIndexes.push(i);
        }
      });

      // ✅ remove unwanted header columns
      headers.forEach((th, i) => {
        if (!keepIndexes.includes(i)) th.remove();
      });

      const rows = Array.from(table.querySelectorAll("tbody tr"));

      // ✅ last 4 days threshold
      const threshold = new Date();
      threshold.setHours(0, 0, 0, 0);
      threshold.setDate(threshold.getDate() - 4);

      rows.forEach(row => {
        const cells = Array.from(row.querySelectorAll("td"));

        // remove unwanted columns
        cells.forEach((td, i) => {
          if (!keepIndexes.includes(i)) td.remove();
        });

        const lastCell = row.querySelector("td:last-child");

        if (!lastCell) {
          row.remove();
          return;
        }

        const match = lastCell.innerText.match(/\d{4}-\d{2}-\d{2}/);

        if (!match) {
          row.remove();
          return;
        }

        const rowDate = new Date(match[0]);
        rowDate.setHours(0, 0, 0, 0);

        if (rowDate < threshold) {
          row.remove();
        }
      });

      // ✅ Optional: enlarge table for clearer screenshot
      table.style.fontSize = "16px";
      table.style.width = "100%";

      // ✅ Remove everything else on page
      document.body.innerHTML = "";
      document.body.appendChild(table);
    });

    // Give layout time to settle
    await page.waitForTimeout(1000);

    // ✅ Screenshot ONLY table (clean output)
    const table = page.locator("table");

    await table.screenshot({
      path: "screenshot.png"
    });

  } catch (err) {
    console.log("Error:", err);

    await page.screenshot({
      path: "screenshot.png",
      fullPage: true
    });
  }

  await browser.close();
})();
