
name: CV Screenshot (Filtered Stable)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      - name: Run script
        run: |
          cat << 'EOF' > script.js


          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();

            await page.goto("https://cv.hres.ca/en/terms/15", {
              timeout: 60000
            });

            await page.waitForTimeout(8000);

            // ✅ SAFE FILTER (will not crash)
            try {
              await page.evaluate(() => {
                const table = document.querySelector("table");
                if (!table) return;

                const allowed = [
                  "Code",
                  "English display name",
                  "French display name",
                  "Source Status",
                  "Last updated"
                ];

                const headers = Array.from(table.querySelectorAll("thead th"));

                // keep only target columns
                const keep = [];
                headers.forEach((h, i) => {
                  if (allowed.some(a => h.innerText.includes(a))) {
                    keep.push(i);
                  }
                });

                headers.forEach((h, i) => {
                  if (!keep.includes(i)) h.remove();
                });

                const rows = table.querySelectorAll("tbody tr");

                // last 4 days
                const threshold = new Date();
                threshold.setDate(threshold.getDate() - 4);

                rows.forEach(row => {
                  const cells = Array.from(row.querySelectorAll("td"));

                  cells.forEach((td, i) => {
                    if (!keep.includes(i)) td.remove();
                  });

                  const last = row.querySelector("td:last-child");
                  if (!last) return;

                  const text = last.innerText.trim();

                  let d = new Date(text);
                  if (isNaN(d)) return; // don't crash

                  if (d < threshold) {
                    row.remove();
                  }
                });
              });
            } catch (e) {
              console.log("Filtering skipped (safe mode)");
            }

            // ✅ Always take screenshot
            await page.locator("table").screenshot({
              path: "screenshot.png"
            }).catch(async () => {
              await page.screenshot({
                path: "screenshot.png",
                fullPage: true
              });
            });

            await browser.close();
          })();
          EOF

          node script.js

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: filtered-result
          path: screenshot.png
