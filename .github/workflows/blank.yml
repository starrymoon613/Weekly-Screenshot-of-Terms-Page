
const { chromium } = require("playwright");

(async () => {
  const browser = await chromium.launch();
  const page = await browser.newPage();

  await page.goto("https://cv.hres.ca/en/terms/15", {
    timeout: 60000
  });

  await page.waitForSelector("table");

  const allRows = [];

  // ✅ date threshold
  const threshold = new Date();
  threshold.setDate(threshold.getDate() - 4);
  threshold.setHours(0, 0, 0, 0);

  while (true) {
    await page.waitForTimeout(1500);

    // ✅ extract rows from current page
    const rows = await page.evaluate((thresholdISO) => {
      const table = document.querySelector("table");
      if (!table) return [];

      const headers = Array.from(table.querySelectorAll("thead th"));

      const allowed = [
        "Code",
        "English Display Name",
        "French Display Name",
        "Source",
        "Status",
        "Last updated"
      ];

      const keepIndexes = headers
        .map((th, i) => ({
          index: i,
          text: th.innerText.trim()
        }))
        .filter(h => allowed.some(a => h.text.includes(a)))
        .map(h => h.index);

      const threshold = new Date(thresholdISO);

      const data = [];

      const rows = table.querySelectorAll("tbody tr");

      rows.forEach(row => {
        const cells = Array.from(row.querySelectorAll("td"));

        const filtered = keepIndexes.map(i => cells[i]?.innerText.trim());

        const last = filtered[filtered.length - 1];
        if (!last) return;

        const match = last.match(/\d{4}-\d{2}-\d{2}/);
        if (!match) return;

        const rowDate = new Date(match[0]);
        rowDate.setHours(0, 0, 0, 0);

        if (rowDate >= threshold) {
          data.push(filtered);
        }
      });

      return data;
    }, threshold.toISOString());

    allRows.push(...rows);

    console.log(`Collected rows so far: ${allRows.length}`);

    // ✅ STOP EARLY if no recent rows found
    if (rows.length === 0) {
      console.log("No more recent rows — stopping early.");
      break;
    }

    // ✅ try clicking "Next"
    const nextButton = await page.locator('a:has-text("Next")');

    if (!(await nextButton.isVisible())) break;

    const isDisabled = await nextButton.getAttribute("class");

    if (isDisabled && isDisabled.includes("disabled")) break;

    await Promise.all([
      page.waitForLoadState("networkidle"),
      nextButton.click()
    ]);
  }

  // ✅ Build clean HTML table
  const html = `
    <html>
      <head>
        <style>
          body { font-family: Arial; padding: 20px; }
          table { border-collapse: collapse; width: 100%; }
          th, td { border: 1px solid #ccc; padding: 8px; }
          th { background: #f5f5f5; }
        </style>
      </head>
      <body>
        <table>
          <thead>
            <tr>
              <th>Code</th>
              <th>English Display Name</th>
              <th>French Display Name</th>
              <th>Source</th>
              <th>Status</th>
              <th>Last updated</th>
            </tr>
          </thead>
          <tbody>
            ${allRows.map(row =>
              `<tr>${row.map(cell => `<td>${cell}</td>`).join("")}</tr>`
            ).join("")}
          </tbody>
        </table>
      </body>
    </html>
  `;

  // ✅ render clean table page
  await page.setContent(html);

  await page.waitForTimeout(1000);

  await page.screenshot({
    path: "screenshot.png",
    fullPage: true
  });

  await browser.close();
})();
