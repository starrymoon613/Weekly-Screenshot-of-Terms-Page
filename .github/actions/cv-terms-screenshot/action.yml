name: "CV Terms Screenshot"
description: "Capture paginated CV terms table (filtered and sorted)"
author: "Connie Leung"

inputs:
  url:
    description: "Target URL"
    required: false
    default: "https://cv.hres.ca/en/terms/15"

  days:
    description: "Filter rows updated in the last N days"
    required: false
    default: "5"

  output:
    description: "Output screenshot file"
    required: false
    default: "screenshot.png"

runs:
  using: "composite"

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install Playwright
      shell: bash
      run: |
        npm init -y
        npm install playwright
        npx playwright install chromium --with-deps

    - name: Run screenshot script
      shell: bash
      run: node "${{ github.action_path }}/screenshot.js"
      env:
        URL: ${{ inputs.url }}
        DAYS: ${{ inputs.days }}
        OUTPUT: ${{ inputs.output }}
